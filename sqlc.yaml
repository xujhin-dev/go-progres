version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/domain/user/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "repository"
        out: "internal/domain/user/repository/"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
